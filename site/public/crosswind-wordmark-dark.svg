<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 60" fill="none">
  <!-- wind lines -->
  <g transform="translate(4, 6)">
    <line x1="0" y1="18" x2="28" y2="18" stroke="#0ea5e9" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="4" y1="24" x2="22" y2="24" stroke="#0ea5e9" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="8" y1="30" x2="18" y2="30" stroke="#0ea5e9" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
    <!-- airplane -->
    <g transform="translate(30, 12) rotate(-30)">
      <polygon points="0,-10 3,5 0,2.5 -3,5" fill="#f8fafc"/>
      <polygon points="0,-3 10,3 0,4.5" fill="#0ea5e9" opacity="0.9"/>
      <polygon points="0,-3 -10,3 0,4.5" fill="#0ea5e9" opacity="0.6"/>
    </g>
  </g>
  <!-- text -->
  <text x="60" y="42" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#f8fafc" letter-spacing="1">crosswind</text>
</svg>
